     Prompts that were mainly used inlcude just adding features -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habit Detail — Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #2c2c2a;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #888780;
      margin-bottom: 2rem;
      text-align: center;
    }

    .phone-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .phone {
      width: 270px;
      background: #d3d1c7;
      border-radius: 36px;
      border: 1px solid #b4b2a9;
      padding: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .screen {
      background: #ffffff;
      border-radius: 26px;
      overflow: hidden;
      min-height: 530px;
      border: 0.5px solid #e8e6df;
    }

    .screen-label {
      font-size: 12px;
      color: #888780;
      letter-spacing: 0.03em;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px 6px;
      font-size: 11px;
      font-weight: 500;
      color: #888780;
    }

    /* ── Detail ── */
    .detail-back {
      padding: 6px 16px 0;
      font-size: 12px; color: #534ab7;
    }
    .detail-hero {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 16px 12px; text-align: center;
    }
    .detail-icon {
      width: 54px; height: 54px; border-radius: 16px;
      background: #eeedfe; display: flex; align-items: center;
      justify-content: center; font-size: 26px; margin-bottom: 10px;
    }
    .detail-name { font-size: 17px; font-weight: 500; color: #2c2c2a; }
    .detail-freq { font-size: 12px; color: #888780; margin-top: 3px; }
    .detail-created { font-size: 11px; color: #b4b2a9; margin-top: 2px; }

    .stat-row { display: flex; gap: 8px; padding: 0 16px 14px; }
    .stat-card {
      flex: 1; background: #f4f2ee; border-radius: 10px;
      padding: 10px; text-align: center; border: 0.5px solid #d3d1c7;
    }
    .stat-num { font-size: 20px; font-weight: 500; color: #2c2c2a; }
    .stat-lbl { font-size: 10px; color: #888780; margin-top: 2px; }

    .cal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 16px 8px; font-size: 12px; font-weight: 500; color: #888780;
    }
    .cal-link { color: #534ab7; font-size: 11px; }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 6px; padding: 0 16px 18px;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500;
    }
    .cal-done  { background: #d4f0e5; color: #1d9e75; }
    .cal-miss  { background: #fde8e8; color: #d94f4f; }
    .cal-today { background: #e4e2f9; color: #534ab7; }
    .cal-empty { background: transparent; }

    .already-done {
      margin: 0 16px; padding: 13px; background: #e1f5ee;
      border-radius: 14px; text-align: center;
      font-size: 14px; font-weight: 500; color: #0f6e56;
      border: 0.5px solid #5dcaa5;
    }
  </style>
</head>
<body>

  <h1>Habit Detail</h1>
  <p class="subtitle">Stats &amp; calendar view</p>

  <div class="phone-group">
    <div class="phone">
      <div class="screen">
        <div class="status-bar"><span>9:41</span><span>●●●</span></div>
        <div class="detail-back">← Back</div>
        <div class="detail-hero">
          <div class="detail-icon">🧘</div>
          <div class="detail-name">Morning meditation</div>
          <div class="detail-freq">Daily · 10 min</div>
          <div class="detail-created">Created on March 1, 2026</div>
        </div>

        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-num">5</div>
            <div class="stat-lbl">Current streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">9</div>
            <div class="stat-lbl">Best streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">14</div>
            <div class="stat-lbl">Total completions</div>
          </div>
        </div>

        <div class="cal-header">
          <span>March 2026</span>
          <span class="cal-link">See all →</span>
        </div>
        <div class="cal-grid">
          <div class="cal-empty"></div><div class="cal-empty"></div>
          <div class="cal-empty"></div><div class="cal-empty"></div>
          <div class="cal-empty"></div><div class="cal-empty"></div>
          <div class="cal-miss">1</div>
          <div class="cal-done">2</div><div class="cal-done">3</div>
          <div class="cal-done">4</div><div class="cal-done">5</div>
          <div class="cal-done">6</div><div class="cal-done">7</div>
          <div class="cal-done">8</div>
          <div class="cal-done">9</div><div class="cal-done">10</div>
          <div class="cal-miss">11</div><div class="cal-done">12</div>
          <div class="cal-done">13</div><div class="cal-done">14</div>
          <div class="cal-done">15</div>
          <div class="cal-today">16</div>
          <div class="cal-miss">17</div><div class="cal-miss">18</div>
          <div class="cal-miss">19</div><div class="cal-miss">20</div>
          <div class="cal-miss">21</div>
        </div>

        <div class="already-done">Completed today ✓</div>
      </div>
    </div>
    <div class="screen-label">Habit detail</div>
  </div>

</body>
</html>
