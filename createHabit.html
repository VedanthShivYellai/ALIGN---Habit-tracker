<!-- #Claude AI provided a walkthrough to explain how to implement code for the "Create a habit" UI based on our initial mock up. Given Prompt:"provide a walkthrough to explain how to implement code for the "Create a habit" page UI based on the given initial mock up"-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Habit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #2c2c2a;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #888780;
      margin-bottom: 2rem;
      text-align: center;
    }

    .phone-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .phone {
      width: 270px;
      background: #d3d1c7;
      border-radius: 36px;
      border: 1px solid #b4b2a9;
      padding: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .screen {
      background: #ffffff;
      border-radius: 26px;
      overflow: hidden;
      min-height: 530px;
      border: 0.5px solid #e8e6df;
    }

    .screen-label {
      font-size: 12px;
      color: #888780;
      letter-spacing: 0.03em;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px 6px;
      font-size: 11px;
      font-weight: 500;
      color: #888780;
    }

    /* ── Header ── */
    .add-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 10px;
    }

    .add-title { font-size: 15px; font-weight: 600; color: #2c2c2a; }

    .cancel-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #888780;
      cursor: pointer;
      font-family: inherit;
    }

    .cancel-btn:hover { color: #534ab7; }

    .divider { height: 0.5px; background: #f0ede8; margin: 0 16px 10px; }

    /* ── Form ── */
    .form-section { padding: 0 16px 10px; }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #888780;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: #f4f2ee;
      border: 0.5px solid #d3d1c7;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #2c2c2a;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .form-input::placeholder { color: #b4b2a9; }

    .form-input:focus {
      border-color: #534ab7;
      box-shadow: 0 0 0 2px #eeedfe;
    }

    .form-input.error {
      border-color: #d85a30;
      box-shadow: 0 0 0 2px #faece7;
    }

    .field-error {
      display: block;
      font-size: 10px;
      color: #d85a30;
      margin-top: 4px;
    }

    /* ── Emoji Picker ── */
    .emoji-grid { display: flex; gap: 5px; flex-wrap: wrap; }

    .emoji-opt {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #f4f2ee;
      border: 0.5px solid #d3d1c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.12s, border 0.12s, background 0.12s;
    }

    .emoji-opt:hover { transform: scale(1.1); }

    .emoji-opt.selected { border: 2px solid #534ab7; background: #eeedfe; }

    /* ── Frequency Chips ── */
    .freq-row { display: flex; gap: 4px; }

    .freq-chip {
      flex: 1;
      padding: 6px 0;
      border-radius: 8px;
      background: #f4f2ee;
      border: 0.5px solid #d3d1c7;
      font-size: 10px;
      color: #888780;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, border 0.15s, color 0.15s;
    }

    .freq-chip:hover { border-color: #b0a8e8; }

    .freq-chip.selected {
      background: #eeedfe;
      border: 1.5px solid #534ab7;
      color: #3c3489;
      font-weight: 600;
    }

    /* ── Color Picker ── */
    .color-row { display: flex; gap: 8px; align-items: center; }

    .color-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: transform 0.12s, outline-offset 0.12s;
      outline: 2px solid transparent;
      outline-offset: 0px;
    }

    .color-dot:hover { transform: scale(1.15); }

    .color-dot.selected {
      outline: 2px solid #888780;
      outline-offset: 2.5px;
    }

    /* ── Save Button ── */
    .save-btn {
      width: 100%;
      padding: 11px;
      background: #534ab7;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .save-btn:hover { background: #4540a3; }
    .save-btn:active { transform: scale(0.98); }
    .save-btn:disabled { background: #b0a8e8; cursor: not-allowed; }
    .save-btn.loading { background: #b0a8e8; cursor: not-allowed; }
    .save-btn.success { background: #1d9e75; }
  </style>
</head>
<body>

  <h1>Create Habit</h1>
  <p class="subtitle">New habit form</p>

  <div class="phone-group">
    <div class="phone">
      <div class="screen">

        <div class="status-bar"><span>9:41</span><span>●●●</span></div>

        <div class="add-header">
          <button class="cancel-btn" id="cancelBtn" type="button">Cancel</button>
          <span class="add-title">New habit</span>
          <span style="width:40px"></span>
        </div>

        <div class="divider"></div>

        <form id="habitForm" novalidate>

          <!-- Habit Name -->
          <div class="form-section">
            <label class="form-label" for="habitName">Habit name</label>
            <input
              class="form-input"
              type="text"
              id="habitName"
              placeholder="e.g. Morning run, Journal..."
              maxlength="32"
              autocomplete="off"
            />
            <span class="field-error" id="nameError"></span>
          </div>

          <!-- Icon -->
          <div class="form-section">
            <span class="form-label">Icon</span>
            <div class="emoji-grid" id="emojiGrid">
              <button type="button" class="emoji-opt selected" data-value="🏃">🏃</button>
              <button type="button" class="emoji-opt" data-value="💧">💧</button>
              <button type="button" class="emoji-opt" data-value="🧘">🧘</button>
              <button type="button" class="emoji-opt" data-value="📖">📖</button>
              <button type="button" class="emoji-opt" data-value="🥗">🥗</button>
              <button type="button" class="emoji-opt" data-value="🎯">🎯</button>
              <button type="button" class="emoji-opt" data-value="💪">💪</button>
              <button type="button" class="emoji-opt" data-value="✍️">✍️</button>
            </div>
            <input type="hidden" id="selectedIcon" value="🏃"/>
          </div>

          <!-- Frequency -->
          <div class="form-section">
            <span class="form-label">Frequency</span>
            <div class="freq-row" id="freqRow">
              <button type="button" class="freq-chip selected" data-value="daily">Daily</button>
              <button type="button" class="freq-chip" data-value="weekdays">Weekdays</button>
              <button type="button" class="freq-chip" data-value="weekly">Weekly</button>
              <button type="button" class="freq-chip" data-value="custom">Custom</button>
            </div>
            <input type="hidden" id="selectedFreq" value="daily"/>
          </div>

          <!-- Color -->
          <div class="form-section">
            <span class="form-label">Color</span>
            <div class="color-row" id="colorRow">
              <!--Claude helped idenity the proper hex value for the necessary colors, prompted to produce the hex values for each part of the UI-->
              <button type="button" class="color-dot selected" data-value="#534ab7" style="background:#534ab7;" aria-label="Purple"></button>
              <button type="button" class="color-dot" data-value="#1d9e75" style="background:#1d9e75;" aria-label="Green"></button>
              <button type="button" class="color-dot" data-value="#d85a30" style="background:#d85a30;" aria-label="Orange"></button>
              <button type="button" class="color-dot" data-value="#ba7517" style="background:#ba7517;" aria-label="Light Orange"></button>
              <button type="button" class="color-dot" data-value="#378add" style="background:#378add;" aria-label="Blue"></button>
              <button type="button" class="color-dot" data-value="#d4537e" style="background:#d4537e;" aria-label="Pink"></button>
            </div>
            <input type="hidden" id="selectedColor" value="#534ab7"/>
          </div>

          <!--Claude derived code for how to implement the reminder and submit features-->
          <!-- Reminder -->
          <div class="form-section">
            <label class="form-label" for="reminder">Reminder</label>
            <input
              class="form-input"
              type="time"
              id="reminder"
              value="12:00"
            />
          </div>

          <!-- Save -->
          <div class="form-section">
            <button type="submit" id="saveBtn" class="save-btn">Save Habit</button>
          </div>

        </form>
      </div>
    </div>
    <div class="screen-label">Create habit</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
